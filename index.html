<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rastreamento J&T</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;
    background-color: #f2f2f2;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    display: inline-block;
}

button {
    font-size: 18px;
    padding: 15px 25px;
    background-color: #ff6600;
    color: white;
    border: none;
    border-radius: 8px;
}

button:active {
    background-color: #cc5200;
}
</style>

<script>
function abrirRastreamento() {

    // copia o código
    navigator.clipboard.writeText("888030666639056");

    // abre site
    window.open(
        "https://www.jtexpress.com.br/trajectoryQuery",
        "_blank"
    );

}
</script>

</head>

<body>

<div class="container">

<h2>📦 Rastreamento J&T</h2>

<p>
Ao tocar no botão:<br>
✔ O código será copiado automaticamente<br>
✔ O site da J&T abrirá
</p>

<button onclick="abrirRastreamento()">
Abrir Rastreamento
</button>

<p style="margin-top:15px;font-size:14px;color:gray;">
Código será colado automaticamente.
</p>

</div>

</body>
</html>
